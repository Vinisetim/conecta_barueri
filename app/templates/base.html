<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Barueri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/sidebar.css') }}" rel="stylesheet">


</head>
<body>
   {% if show_sidebar %}
    <button id="sidebarCollapse" class="btn btn-outline-light m-3 position-fixed top-0 start-0 z-3">
        <i class="fas fa-bars"></i>
    </button>

<nav class="sidebar p-4" id="sidebar">
    <button class="close-sidebar" id="dismiss">
        <i class="fas fa-times"></i>
    </button>

    <h4 class="mb-4 mt-2">Conecta Barueri</h4>
    <ul class="nav flex-column">
        <li class="nav-item mb-2">
            <a href="/" class="nav-link text-white"><i class="fas fa-home me-2"></i> Início</a>
        </li>
        </ul>
</nav>
    {% endif %}
 <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebar = document.getElementById('sidebar');
        const btnCollapse = document.getElementById('sidebarCollapse');
        const btnDismiss = document.getElementById('dismiss');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
        }

        btnCollapse.addEventListener('click', toggleSidebar);
        btnDismiss.addEventListener('click', toggleSidebar);
    });
</script>
</body>
</html>
