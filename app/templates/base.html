<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Conecta Barueri{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="{{ url_for('main.index') }}">
                Conecta <span class="text-primary">Barueri</span>
            </a>
            
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="#servicos">Serviços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="#sobre">Sobre</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="{{ url_for('auth.login') if 'auth' in config else '#' }}" class="btn-outline-primary-custom">
                            <i class="bi bi-person-circle"></i> Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main style="padding-top: 85px; min-height: 75vh;">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white py-4 mt-5 border-top border-light">
        <div class="container">
            <div class="row align-items-center justify-content-between">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <span class="fw-bold text-dark fs-5">Conecta <span class="text-primary">Barueri</span></span>
                    <p class="small text-muted mb-0 mt-1">© 2026 - Projeto Técnico Etec (Informática para Internet).</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3 fs-5">
                        <a href="#" class="text-secondary hover-primary"><i class="bi bi-github"></i></a>
                        <a href="#" class="text-secondary hover-primary"><i class="bi bi-envelope-fill"></i></a>
                        <a href="#" class="text-secondary hover-primary"><i class="bi bi-linkedin"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
