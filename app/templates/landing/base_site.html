<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Conecta Barueri{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top px-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="/">Conecta <span class="text-primary">Barueri</span></a>
            <div class="ms-auto">
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-light px-4">
                    <i class="bi bi-person"></i> Login
                </a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="py-5 mt-5 border-top border-secondary">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <span class="fw-bold">Conecta <span class="text-primary">Barueri</span></span>
                <p class="small text-muted mb-0">© 2026 - Projeto Técnico Etec (Informática para Internet)</p>
            </div>
            <div class="h4">
                <i class="bi bi-github me-3"></i>
                <i class="bi bi-envelope"></i>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
